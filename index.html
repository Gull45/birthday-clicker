<!DOCTYPE html>
<html>
<head>
  <title>clciker gane</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="overlay" class="overlay">
  <div class="overlay-box">
    <h1>click</h1>
    <p>msic now lcikc</p>
  </div>
</div>

<div id="app" class="app">

  <div class="panel">
    <div id="count" class="count">0</div>
    <button id="clickBtn" class="click-btn">🎉</button>
  </div>

  <div class="panel leaderboard">
    <h2>global ledar baopeds</h2>
    <div id="leaderboard"></div>
  </div>

</div>

<audio id="music" src="music.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const db = window.supabase.createClient(
  "YOUR_PROJECT_URL",
  "YOUR_ANON_KEY"
);

const overlay = document.getElementById("overlay");
const app = document.getElementById("app");
const music = document.getElementById("music");

let userId = localStorage.getItem("userId");
let username = localStorage.getItem("username");

/* START GAME */
overlay.addEventListener("click", async () => {
  overlay.style.display = "none";

  setTimeout(() => {
    music.volume = 0.3;
    music.play();
  }, 240);

  await initUser();

  app.style.display = "flex";

  loadAll();
  setInterval(loadLeaderboard, 3000);
});

/* FIXED USER SYSTEM */
async function initUser() {
  let storedId = localStorage.getItem("userId");
  let storedName = localStorage.getItem("username");

  if (storedId) {
    const { data } = await db
      .from("users")
      .select("*")
      .eq("id", storedId)
      .maybeSingle();

    if (data) {
      userId = storedId;
      username = storedName;
      return;
    }

    localStorage.removeItem("userId");
    localStorage.removeItem("username");
  }

  username = prompt("Enter username");

  if (!username) username = "Player";

  userId = crypto.randomUUID();

  localStorage.setItem("userId", userId);
  localStorage.setItem("username", username);

  await db.from("users").insert({
    id: userId,
    username,
    clicks: 0
  });
}

/* CLICK SOUND */
function playClickTone() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.value = 520;

  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(
    0.001,
    ctx.currentTime + 0.12
  );

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.12);
}

/* CLICK */
document.getElementById("clickBtn").addEventListener("click", click);

async function click() {
  playClickTone();

  const { data: stats } = await db
    .from("stats")
    .select("total_clicks")
    .eq("id", 1)
    .single();

  await db
    .from("stats")
    .update({
      total_clicks: stats.total_clicks + 1
    })
    .eq("id", 1);

  const { data: user } = await db
    .from("users")
    .select("clicks")
    .eq("id", userId)
    .single();

  if (user) {
    await db
      .from("users")
      .update({
        clicks: user.clicks + 1
      })
      .eq("id", userId);
  }

  showPlusOne();
  loadCount();
}

/* +1 EFFECT */
function showPlusOne() {
  const el = document.createElement("div");
  el.className = "plus-one";
  el.textContent = "+1";

  el.style.left =
    window.innerWidth / 2 +
    (Math.random() * 100 - 50) +
    "px";

  el.style.top = window.innerHeight / 2 + "px";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 700);
}

/* LOAD GLOBAL COUNT */
async function loadCount() {
  const { data } = await db
    .from("stats")
    .select("total_clicks")
    .eq("id", 1)
    .single();

  document.getElementById("count").textContent =
    data.total_clicks;
}

/* LEADERBOARD */
async function loadLeaderboard() {
  const { data } = await db
    .from("users")
    .select("*")
    .order("clicks", { ascending: false })
    .limit(10);

  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  data.forEach((u, i) => {
    const row = document.createElement("div");
    row.className = "leaderboard-item";

    row.innerHTML = `
      <span>${i + 1}. ${u.username}</span>
      <span>${u.clicks}</span>
    `;

    board.appendChild(row);
  });
}

/* INIT LOAD */
function loadAll() {
  loadCount();
  loadLeaderboard();
}
</script>

</body>
</html>
